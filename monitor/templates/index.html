<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>RTC Monitor</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>RPi RTC Manager Monitor</h1>

<div class="panel">
<h2>Services</h2>
<table id="services"></table>
</div>

<div class="panel">
<h2>Timer</h2>
<table id="timer"></table>
</div>

<div class="panel">
<h2>Clock</h2>

<p>System Time : <span id="system_time"></span></p>
<p>RTC Time : <span id="rtc_time"></span></p>
<p>Drift : <span id="drift"></span> seconds</p>

</div>

<div class="panel">
<h2>Recent Logs</h2>
<pre id="logs"></pre>
</div>

<script src="/static/app.js"></script>

</body>
</html>
